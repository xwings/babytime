; PlatformIO Project Configuration File
;
; Two envs, one per supported board. Select with `pio run -e <env>` or
; via the top-level Makefile (`make build DEVICE=<env>`). Shared config
; lives in [env]; per-env stanzas pin board, build flags, and the
; build_src_filter that excludes the other board's HAL backend.

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=2
  -Isrc
lib_deps =
  bblanchon/ArduinoJson@^7.4.2

[env:dnesp32s3b]
board = esp32-s3-devkitc-1
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
build_flags =
  ${env.build_flags}
  -DBOARD_DNESP32S3B
  -DU8G2_USE_LARGE_FONTS
  -DU8G2_WITH_UNICODE
build_src_filter =
  +<*>
  -<hal/esp32p4_7b/>
lib_deps =
  ${env.lib_deps}
  moononournation/GFX Library for Arduino@^1.6.0
  olikraus/U8g2@^2.36.5

[env:esp32p4_7b]
board = esp32-p4
build_flags =
  ${env.build_flags}
  -DBOARD_ESP32P4_7B
build_src_filter =
  +<*>
  -<hal/dnesp32s3b/>
lib_deps =
  ${env.lib_deps}
; Phase B will add the display + touch driver here. The current stub backend
; (hal/esp32p4_7b/) has no external dependencies, so the env is buildable
; today. See ARCHITECTURE/firmware-hal.md Open Gaps for the bring-up plan.
