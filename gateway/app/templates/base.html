<!doctype html>
<html lang="{{ html_lang or 'en' }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>babytime gateway</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>babytime gateway</h1>
  <nav class="tabs">
    <span class="lang-switch" role="group" aria-label="Language">
      <a href="/lang/en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
      <a href="/lang/zh" class="lang-btn {% if lang == 'zh' %}active{% endif %}">中文</a>
    </span>
    <button type="button" class="tab-btn active" data-tab="records">{{ t('tab_records') }}</button>
    <button type="button" class="tab-btn" data-tab="config">{{ t('tab_config') }}</button>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<script>
  window.I18N = {
    unit_hour: {{ t('unit_hour') | tojson }},
    unit_minute: {{ t('unit_minute') | tojson }},
    unit_second: {{ t('unit_second') | tojson }}
  };
</script>
<script>
  (function () {
    const buttons = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    function activate(name) {
      buttons.forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      panels.forEach(p => p.classList.toggle('active', p.dataset.tab === name));
      try { history.replaceState(null, '', '#' + name); } catch (e) {}
    }
    buttons.forEach(b => b.addEventListener('click', () => activate(b.dataset.tab)));
    const initial = (location.hash || '').replace('#', '') || 'records';
    if (document.querySelector('.tab-btn[data-tab="' + initial + '"]')) activate(initial);
  })();
</script>
</body>
</html>
