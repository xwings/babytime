services:
  gateway:
    build: .
    image: babytime-gateway:latest
    container_name: babytime-gateway
    restart: unless-stopped
    ports:
      # HOST:CONTAINER — change the left side to expose on a different host port.
      - "8080:8080"
    volumes:
      # Host ./babytime holds the SQLite DB and any runtime config the gateway
      # writes. Map to a different host path if you want it elsewhere.
      - ./babytime:/babytime
    environment:
      # Empty = trust LAN, no auth. Set a non-empty token to require
      # `Authorization: Bearer <token>` on /api/* and the web UI.
      GATEWAY_TOKEN: ""
      GATEWAY_DB_PATH: "/babytime/gateway.db"
      GATEWAY_CONFIG_PATH: "/babytime/config.json"
      GATEWAY_BIND_HOST: "0.0.0.0"
      GATEWAY_BIND_PORT: "8080"
      TZ: "Asia/Shanghai"
